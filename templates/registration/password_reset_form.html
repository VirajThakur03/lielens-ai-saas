<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-slate-950 text-slate-100">
    <div class="w-full max-w-md rounded-2xl border border-white/20 bg-white/10 backdrop-blur-lg p-8">
        <h1 class="text-2xl font-bold mb-2">Reset password</h1>
        <p class="text-sm text-slate-300 mb-6">Enter your account email to receive a reset link.</p>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <input type="email" name="email" required class="w-full rounded-lg bg-slate-900/70 border border-slate-700 px-3 py-2 outline-none focus:border-cyan-400" placeholder="you@example.com" />
            <button class="w-full rounded-lg bg-cyan-400 text-black font-semibold py-2 hover:bg-cyan-300 transition" type="submit">
                Send reset link
            </button>
        </form>
    </div>
</body>
</html>
