<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set New Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-slate-950 text-slate-100">
    <div class="w-full max-w-md rounded-2xl border border-white/20 bg-white/10 backdrop-blur-lg p-8">
        <h1 class="text-2xl font-bold mb-4">Set a new password</h1>
        {% if validlink %}
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <input type="password" name="new_password1" required class="w-full rounded-lg bg-slate-900/70 border border-slate-700 px-3 py-2" placeholder="New password" />
            <input type="password" name="new_password2" required class="w-full rounded-lg bg-slate-900/70 border border-slate-700 px-3 py-2" placeholder="Confirm new password" />
            <button class="w-full rounded-lg bg-cyan-400 text-black font-semibold py-2 hover:bg-cyan-300 transition" type="submit">
                Update password
            </button>
        </form>
        {% else %}
        <p class="text-rose-300">This reset link is invalid or expired.</p>
        <a href="/accounts/password_reset/" class="inline-block mt-4 text-cyan-300 underline">Request a new link</a>
        {% endif %}
    </div>
</body>
</html>
